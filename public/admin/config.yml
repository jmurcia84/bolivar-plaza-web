# local_backend: true   ← uncomment this line only when running: npm run dev:cms

backend:
  name: git-gateway
  branch: main

media_folder: public/uploads
public_folder: /uploads

locale: es

collections:
  - name: banners
    label: Banners del slider
    label_singular: Banner
    folder: src/content/banners
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Título (opcional), name: title, widget: string, required: false }
      - { label: Imagen, name: image, widget: image, hint: "JPG o PNG horizontal. Tamaño recomendado: 1920×800 px. Máx 2 MB." }
      - { label: URL del enlace (opcional), name: link_url, widget: string, required: false }
      - { label: Activo, name: active, widget: boolean, default: true }

  - name: novedades
    label: Novedades
    label_singular: Novedad
    folder: src/content/novedades
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Título, name: title, widget: string }
      - { label: Fecha, name: date, widget: datetime, format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
      - { label: Imagen, name: image, widget: image, required: false, hint: "JPG o PNG. Tamaño recomendado: 800×450 px (proporción 16:9). Máx 1 MB." }
      - { label: Descripción corta, name: summary, widget: text }
      - { label: Contenido, name: body, widget: markdown }
      - { label: Activo, name: active, widget: boolean, default: true }

  - name: stores
    label: Tiendas
    label_singular: Tienda
    folder: src/content/stores
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Nombre, name: name, widget: string }
      - label: Categoría
        name: category
        widget: select
        options: [Moda, Comidas, Entretenimiento, Servicios, Salud y Belleza, Tecnología, Hogar, Otros]
      - label: Piso
        name: floor
        widget: select
        options: [Piso 1, Piso 2, Piso 3, Piso 4]
      - { label: "Número de Local", name: local, widget: string, required: false, hint: "Ej: Local 101, Local 2-15" }
      - { label: Descripción corta, name: description, widget: text, required: false }
      - { label: Logo, name: logo, widget: image, required: false, hint: "PNG con fondo transparente recomendado. Tamaño: 300×300 px. Máx 500 KB." }
      - { label: "Facebook URL", name: facebook, widget: string, required: false }
      - { label: "Instagram URL", name: instagram, widget: string, required: false }
      - { label: "X (Twitter) URL", name: twitter_x, widget: string, required: false }
      - { label: "WhatsApp", name: whatsapp, widget: string, required: false, hint: "Solo número con código de país. Ej: 573001234567" }

  - name: events
    label: Eventos
    label_singular: Evento
    folder: src/content/events
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Título, name: title, widget: string }
      - { label: Fecha, name: date, widget: datetime, format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
      - { label: Descripción, name: description, widget: text }
      - { label: Imagen, name: image, widget: image, required: false, hint: "JPG o PNG. Tamaño recomendado: 800×450 px (proporción 16:9). Máx 1 MB." }
      - { label: Activo, name: active, widget: boolean, default: true }

  - name: popup
    label: Pop-up promocional
    label_singular: Pop-up
    files:
      - label: Configuración del pop-up
        name: popup
        file: src/content/popup.json
        fields:
          - { label: Título, name: title, widget: string }
          - { label: Cuerpo, name: body, widget: text }
          - { label: Texto del botón, name: button_label, widget: string }
          - { label: URL del botón, name: button_url, widget: string }
          - { label: Imagen, name: image, widget: image, required: false, hint: "JPG o PNG vertical (tipo afiche). Tamaño recomendado: 600×900 px. Máx 1 MB." }
          - { label: Activo, name: active, widget: boolean, default: true }

  - name: settings
    label: Configuración general
    label_singular: Configuración
    files:
      - label: Ajustes del sitio
        name: settings
        file: src/content/settings.json
        fields:
          - { label: Título del hero, name: hero_title, widget: string }
          - { label: Subtítulo del hero, name: hero_subtitle, widget: text }
          - { label: Texto del CTA del hero, name: hero_cta_text, widget: string }
          - { label: Teléfono, name: phone, widget: string }
          - { label: Correo electrónico, name: email, widget: string }
          - { label: URL de Facebook, name: facebook_url, widget: string, required: false }
          - { label: URL de Instagram, name: instagram_url, widget: string, required: false }
          - { label: "Horario semana (ej: Lun–Sáb: 9:00 am – 7:00 pm)", name: hours_weekday, widget: string }
          - { label: "Horario fin de semana (ej: Dom y Festivos: 11:00 am – 4:00 pm)", name: hours_weekend, widget: string }
